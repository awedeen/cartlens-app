name: CI

on: [push, pull_request]

jobs:
  ci:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (React Router typegen + tsc)
        run: npm run typecheck

      - name: Build
        run: npm run build
